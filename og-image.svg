<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Darko Petrovic. Serial Marketer. CMO. Head of Marketing">
  <defs>
